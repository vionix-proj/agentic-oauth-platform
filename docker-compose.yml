services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: \${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: \${KEYCLOAK_ADMIN_PASSWORD:-admin}
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8080'"]
      interval: 10s
      retries: 20

  vault:
    image: hashicorp/vault:1.17
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: \${VAULT_DEV_ROOT_TOKEN_ID:-root}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    cap_add: ["IPC_LOCK"]
    command: vault server -dev
    volumes:
      - ./infra/vault/seed.sh:/vault/config/seed.sh:ro
    ports:
      - "8200:8200"

  opa:
    image: openpolicyagent/opa:0.70.0
    command:
      - "run"
      - "--server"
      - "--addr=0.0.0.0:8181"
      - "/policies"
      - "/data"
    volumes:
      - ./infra/opa/policies:/policies:ro
      - ./infra/opa/data:/data:ro
    ports:
      - "8181:8181"

  agent-registry:
    build: ./services/agent-registry
    ports:
      - "8001:8001"

  token-broker:
    build: ./services/token-broker
    environment:
      AGENT_REGISTRY_URL: \${AGENT_REGISTRY_URL:-http://agent-registry:8001}
      OPA_URL: \${OPA_URL:-http://opa:8181}
      VAULT_ADDR: \${VAULT_ADDR:-http://vault:8200}
      VAULT_TOKEN: \${VAULT_DEV_ROOT_TOKEN_ID:-root}
    depends_on: [agent-registry, opa, vault]
    ports:
      - "8002:8002"

  orchestrator-agent:
    build: ./services/orchestrator-agent
    environment:
      AGENT_A_URL: \${AGENT_A_URL:-http://agent-a:8004}
      AGENT_B_URL: \${AGENT_B_URL:-http://agent-b:8005}
    depends_on: [agent-a, agent-b]
    ports:
      - "8003:8003"

  agent-a:
    build: ./services/agent-a
    environment:
      TOKEN_BROKER_URL: \${TOKEN_BROKER_URL:-http://token-broker:8002}
    depends_on: [token-broker]
    ports:
      - "8004:8004"

  agent-b:
    build: ./services/agent-b
    environment:
      TOKEN_BROKER_URL: \${TOKEN_BROKER_URL:-http://token-broker:8002}
    depends_on: [token-broker]
    ports:
      - "8005:8005"
